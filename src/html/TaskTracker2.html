<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cell-transition { transition: all 0.2s ease; }
        .row-deleting { opacity: 0.5; pointer-events: none; transition: opacity 0.3s ease; }
        .delete-btn i { pointer-events: none; }
        .move-btn i { pointer-events: none; }
        .convert-btn i { pointer-events: none; }
        .note-btn i { pointer-events: none; }
        .history-btn i { pointer-events: none; }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal Animation */
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }

        /* Always-visible add task footer */
        #addTaskFooter {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: white;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.07);
            padding: 1rem 1.5rem;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-28">
        <!-- Header Section -->
        <div class="bg-white p-6 border-b border-slate-100">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Weekly Tracker</h1>
                <div class="flex flex-col sm:flex-row items-center gap-4 bg-slate-50 p-2 rounded-xl border border-slate-200">
                    <!-- Year Controls -->
                    <div class="flex items-center gap-2">
                        <button onclick="changeYear(-1)" class="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" aria-label="Previous Year">
                            <i data-lucide="chevrons-left" class="w-5 h-5"></i>
                        </button>
                        <span id="yearDisplay" class="font-mono font-semibold w-12 text-center text-slate-700">2024</span>
                        <button onclick="changeYear(1)" class="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" aria-label="Next Year">
                            <i data-lucide="chevrons-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="h-4 w-px bg-slate-300 hidden sm:block"></div>
                    <!-- Week Controls -->
                    <div class="flex items-center gap-2">
                        <button onclick="changeWeek(-1)" class="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" aria-label="Previous Week">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                        <div class="text-center w-32">
                            <div id="weekDisplay" class="font-mono font-semibold text-slate-700">Week 1</div>
                            <div id="dateRangeDisplay" class="text-xs text-slate-400 font-medium">Jan 1 - Jan 7</div>
                        </div>
                        <button onclick="changeWeek(1)" class="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" aria-label="Next Week">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="resetToToday()" class="px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors">
                        Today
                    </button>
                </div>
            </div>
        </div>

        <!-- Groups Navigation -->
        <div class="px-6 py-4 flex items-center gap-4 border-b border-slate-50 overflow-hidden">
            <button onclick="openGroupModal()" class="flex-shrink-0 flex items-center gap-1.5 px-4 py-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded-full text-sm font-bold transition-all border border-emerald-100">
                <i data-lucide="plus" class="w-4 h-4"></i> dd Group
            </button>
            <div class="h-6 w-px bg-slate-200"></div>
            <div id="groupTabs" class="flex gap-2 overflow-x-auto no-scrollbar">
                <!-- Groups injected here -->
            </div>
        </div>

        <!-- Table Container -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-slate-400 text-[11px] uppercase tracking-wider font-bold">
                        <th class="p-6 w-64 bg-white sticky left-0 z-20 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">Task Description</th>
                        <th class="p-4 text-center">Mon</th>
                        <th class="p-4 text-center">Tue</th>
                        <th class="p-4 text-center">Wed</th>
                        <th class="p-4 text-center">Thu</th>
                        <th class="p-4 text-center">Fri</th>
                        <th class="p-4 text-center text-blue-500">Sat</th>
                        <th class="p-4 text-center text-blue-500">Sun</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="taskRows" class="divide-y divide-slate-50">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Add Task Footer (fixed) -->
    <div id="addTaskFooter">
        <div class="max-w-6xl mx-auto">
            <form id="addTaskForm" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="taskName" placeholder="Describe the task..."
                    class="flex-1 px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" required>

                <select id="taskType" class="px-4 py-3 rounded-2xl border border-slate-200 bg-white text-slate-600 focus:outline-none">
                    <option value="checklist">Checkbox (Status)</option>
                    <option value="counter">Counter (Quantity)</option>
                    <option value="number">Number (Numeric value)</option>
                    <option value="kaizen">Kaizen (Progress)</option>
                </select>

                <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i> Add Task
                </button>
                <button type="button" id="toggleKeyboard" class="p-3 bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold rounded-2xl shadow-lg transition-all flex items-center justify-center" aria-label="Toggle virtual keyboard">
                    <i data-lucide="keyboard" class="w-5 h-5"></i>
                </button>
                <button type="button" id="toggleDecrement" class="p-3 bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold rounded-2xl shadow-lg transition-all flex items-center justify-center" aria-label="Toggle decrement mode" aria-pressed="false">
                    <i data-lucide="minus" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Group Creation Modal -->
    <div id="groupModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Create New Group</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-semibold text-slate-500 block mb-1">Group Name</label>
                    <input type="text" id="newGroupName" placeholder="e.g. Health, School, Chores"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeGroupModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">
                        Cancel
                    </button>
                    <button onclick="submitNewGroup()" class="flex-1 px-4 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition-all">
                        Create
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Box -->
    <div id="errorBox" class="hidden fixed bottom-4 right-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl shadow-lg z-50">
        <span id="errorText">Error message here.</span>
    </div>

    <!-- Note Modal -->
    <div id="noteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Add Note</h2>
            <p id="noteModalSubtitle" class="text-sm text-slate-400 mb-4"></p>
            <textarea id="noteText" rows="4" placeholder="Write a note for this day..."
                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 outline-none resize-none text-slate-700"></textarea>
            <div class="flex gap-3 pt-4">
                <button onclick="closeNoteModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">
                    Cancel
                </button>
                <button onclick="saveNote()" class="flex-1 px-4 py-3 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 shadow-lg shadow-amber-500/20 transition-all">
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 border border-slate-200 max-h-[80vh] flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">History</h2>
                    <p id="historyModalSubtitle" class="text-sm text-slate-400"></p>
                </div>
                <div class="flex items-center gap-2">
                    <button id="historyFilterToggle" onclick="toggleHistoryFilter()" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors" title="Toggle filter">
                        Active only
                    </button>
                    <button onclick="closeHistoryModal()" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-slate-100">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div id="historyContent" class="overflow-y-auto flex-1 space-y-2 pr-1">
                <!-- History rows injected here -->
            </div>
        </div>
    </div>

    <!-- Virtual Keyboard -->
    <div id="virtualKeyboard" class="hidden fixed bottom-0 left-0 right-0 bg-slate-100 dark:bg-slate-800 p-2 z-[100] shadow-lg border-t border-slate-200 dark:border-slate-700">
        <div id="keyboardContainer" class="max-w-4xl mx-auto">
            <!-- Keyboard rows will be generated by JS -->
        </div>
        <button id="closeKeyboard" class="absolute top-2 right-2 p-1 bg-slate-200 hover:bg-slate-300 rounded-full text-slate-500">
             <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentViewDate = new Date();
        let tasks = [];
        let progress = {};
        let selectedGroup = 'General';
        let allGroups = ['General'];
        let moveMenu = null; // For the move task dropdown
        let isDecrementMode = false;
        let durations = {};
        let notes = {};
        let activeTimer = null; // { taskId, dateStr, startTime, baseSeconds, intervalId }
        let noteModalState = null; // { taskId, dateStr, taskName }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorText').innerText = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        // --- Group Logic ---
        function openGroupModal() {
            document.getElementById('groupModal').classList.remove('hidden');
            document.getElementById('newGroupName').focus();
        }

        function closeGroupModal() {
            document.getElementById('groupModal').classList.add('hidden');
            document.getElementById('newGroupName').value = '';
        }

        async function submitNewGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return;

            try {
                // Assuming your backend handles group creation or just associating it with a task
                // We'll update the local state first
                if (!allGroups.includes(name)) {
                    allGroups.push(name);
                }
                selectedGroup = name;
                closeGroupModal();
                render();
            } catch (err) {
                showError("Could not create group.");
            }
        }

        // --- Date Helpers ---
        function getISOWeek(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function changeYear(offset) {
            currentViewDate.setFullYear(currentViewDate.getFullYear() + offset);
            render();
        }

        function changeWeek(offset) {
            currentViewDate.setDate(currentViewDate.getDate() + (offset * 7));
            render();
        }

        function resetToToday() {
            currentViewDate = new Date();
            render();
        }

        // --- API & State ---
        async function fetchData() {
            try {
                const res = await fetch(`${API_BASE}/week-data`);
                if (!res.ok) throw new Error("Fetch failed");
                const data = await res.json();
                tasks = data.tasks || [];
                progress = data.progress || {};
                durations = data.durations || {};
                notes = data.notes || {};

                // Restore running timer from server
                if (activeTimer) clearInterval(activeTimer.intervalId);
                activeTimer = null;
                if (data.activeTimer) {
                    const { taskId, baseSeconds } = data.activeTimer;
                    activeTimer = {
                        taskId,
                        dateStr: new Date().toISOString().split('T')[0],
                        startTime: Date.now(),
                        baseSeconds,
                        intervalId: setInterval(updateTimerDisplay, 1000)
                    };
                }

                // Update groups list based on existing tasks + General
                const taskGroups = [...new Set(tasks.map(h => h.group))];
                allGroups = [...new Set(['General', ...taskGroups])];

                if (!allGroups.includes(selectedGroup)) {
                    selectedGroup = allGroups[0];
                }
                render();
            } catch (err) {
                console.error(err);
                showError("Server unavailable.");
            }
        }

        async function addTask(name, type) {
            try {
                const res = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, groupName: selectedGroup, categoryName: type })
                });
                if (res.ok) {
                    document.getElementById('taskName').value = '';
                    await fetchData();
                }
            } catch (err) { showError("Failed to add task."); }
        }

        async function deleteTask(taskId) {
            if (!confirm("Remove this task?")) return;
            const row = document.querySelector(`tr[data-task-id="${taskId}"]`);
            if (row) row.classList.add('row-deleting');
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}`, { method: 'DELETE' });
                if (res.ok || res.status === 204) await fetchData();
                else {
                    if (row) row.classList.remove('row-deleting');
                    showError("Delete failed.");
                }
            } catch (err) {
                if (row) row.classList.remove('row-deleting');
                showError("Network error.");
            }
        }

        async function convertToKaizen(taskId) {
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}/type`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoryName: 'kaizen' })
                });
                if (res.ok) await fetchData();
                else showError("Conversion failed.");
            } catch (err) {
                showError("Network error.");
            }
        }

        function openNoteModal(taskId, dateStr, taskName) {
            noteModalState = { taskId, dateStr, taskName };
            const key = `${taskId}_${dateStr}`;
            document.getElementById('noteText').value = notes[key] || '';
            document.getElementById('noteModalSubtitle').textContent = `${taskName} — ${formatDisplayDate(dateStr)}`;
            document.getElementById('noteModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('noteText').focus(), 50);
        }

        function closeNoteModal() {
            document.getElementById('noteModal').classList.add('hidden');
            noteModalState = null;
        }

        async function saveNote() {
            if (!noteModalState) return;
            const { taskId, dateStr } = noteModalState;
            const note = document.getElementById('noteText').value.trim();
            const key = `${taskId}_${dateStr}`;
            notes[key] = note;
            closeNoteModal();
            try {
                await fetch(`${API_BASE}/notes`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId, date: dateStr, note })
                });
            } catch (err) { showError("Failed to save note."); }
        }

        let historyState = null; // { task, rows, activeOnly }

        function renderHistoryRows() {
            if (!historyState) return;
            const { task, rows, activeOnly } = historyState;
            const filtered = activeOnly
                ? rows.filter(r => r.status !== 0 || r.duration_seconds > 0 || (r.note && r.note.length > 0))
                : rows;

            const btn = document.getElementById('historyFilterToggle');
            btn.classList.toggle('bg-blue-600', activeOnly);
            btn.classList.toggle('text-white', activeOnly);
            btn.classList.toggle('bg-slate-100', !activeOnly);
            btn.classList.toggle('text-slate-500', !activeOnly);

            if (!filtered.length) {
                document.getElementById('historyContent').innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No entries to show.</p>';
                return;
            }
            document.getElementById('historyContent').innerHTML = filtered.map(row => {
                const statusHtml = getIconForLevel(row.status, task.type);
                const durHtml = row.duration_seconds > 0
                    ? `<span class="text-xs font-mono text-slate-400 ml-2">${formatDuration(row.duration_seconds)}</span>`
                    : '';
                const noteHtml = row.note
                    ? `<p class="text-sm text-slate-600 mt-1 italic">"${row.note}"</p>`
                    : '';
                return `
                    <div class="flex items-start gap-3 p-3 rounded-xl bg-slate-50 border border-slate-100">
                        <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center">${statusHtml}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold text-slate-700">${formatDisplayDate(row.date)}</span>
                                ${durHtml}
                            </div>
                            ${noteHtml}
                        </div>
                    </div>`;
            }).join('');
            lucide.createIcons({ nodes: [document.getElementById('historyContent')] });
        }

        function toggleHistoryFilter() {
            if (!historyState) return;
            historyState.activeOnly = !historyState.activeOnly;
            renderHistoryRows();
        }

        async function openHistoryModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            historyState = { task, rows: [], activeOnly: true };
            document.getElementById('historyModalSubtitle').textContent = task.name;
            document.getElementById('historyContent').innerHTML = '<p class="text-slate-400 text-sm text-center py-4">Loading...</p>';
            document.getElementById('historyModal').classList.remove('hidden');
            lucide.createIcons({ nodes: [document.getElementById('historyModal')] });

            // Sync toggle button initial state
            const btn = document.getElementById('historyFilterToggle');
            btn.classList.add('bg-blue-600', 'text-white');
            btn.classList.remove('bg-slate-100', 'text-slate-500');

            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}/history`);
                if (!res.ok) throw new Error('Failed');
                const rows = await res.json();
                historyState.rows = rows;
                if (!rows.length) {
                    document.getElementById('historyContent').innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No history yet.</p>';
                    return;
                }
                renderHistoryRows();
            } catch (err) {
                document.getElementById('historyContent').innerHTML = '<p class="text-red-400 text-sm text-center py-4">Failed to load history.</p>';
            }
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
            historyState = null;
        }

        async function moveTask(taskId, newGroup) {
            const row = document.querySelector(`tr[data-task-id="${taskId}"]`);
            if (row) row.classList.add('row-deleting'); // Optimistic fade out

            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}/move`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newGroupName: newGroup })
                });
                if (!res.ok) throw new Error('Move failed');
                await fetchData();
            } catch (err) {
                showError("Failed to move task.");
                if (row) row.classList.remove('row-deleting');
            }
        }

        function openMoveMenu(taskId, currentGroup, button) {
            if (moveMenu) moveMenu.remove();

            const otherGroups = allGroups.filter(g => g !== currentGroup);
            if (otherGroups.length === 0) {
                showError("No other groups exist to move this task to.");
                return;
            }

            moveMenu = document.createElement('div');
            moveMenu.className = 'absolute z-50 mt-1 w-48 bg-white rounded-lg shadow-xl border border-slate-100 py-1';
            moveMenu.innerHTML = otherGroups.map(group =>
                `<a href="#" class="move-to-group-btn block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" data-task-id="${taskId}" data-group="${group}">${group}</a>`
            ).join('');

            document.body.appendChild(moveMenu);
            const rect = button.getBoundingClientRect();
            moveMenu.style.top = `${rect.bottom + window.scrollY}px`;
            moveMenu.style.left = `${rect.right + window.scrollX - moveMenu.offsetWidth}px`;

            setTimeout(() => {
                document.addEventListener('click', closeMoveMenu, { once: true });
            }, 0);
        }

        function closeMoveMenu() {
            if (moveMenu) {
                moveMenu.remove();
                moveMenu = null;
            }
        }

        async function toggleCell(taskId, dateStr, currentStatus, type, direction = 1) {
            let nextStatus;
            if (type === 'counter') {
                nextStatus = (currentStatus || 0) + direction;
                if (nextStatus < 0) nextStatus = 0;
            } else if (type === 'kaizen') {
                nextStatus = ((currentStatus || 0) + direction + 6) % 6;
            } else {
                nextStatus = ((currentStatus || 0) + 1) % 2;
            }

            if (nextStatus === currentStatus) return;

            progress[`${taskId}_${dateStr}`] = nextStatus;
            render();

            try {
                await fetch(`${API_BASE}/progress`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId, date: dateStr, status: nextStatus })
                });
            } catch (err) { fetchData(); }
        }

        // --- Event Listeners & Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            // Click handler for delete buttons, cell buttons, and group tabs
            document.addEventListener('click', (e) => {
                const timerBtn = e.target.closest('.timer-btn');
                if (timerBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleTaskTimer(timerBtn.getAttribute('data-task-id'));
                    return;
                }

                const deleteBtn = e.target.closest('.delete-btn');
                if (deleteBtn) {
                    e.preventDefault(); e.stopPropagation();
                    deleteTask(deleteBtn.getAttribute('data-id'));
                    return;
                }

                const convertBtn = e.target.closest('.convert-btn');
                if (convertBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    convertToKaizen(convertBtn.getAttribute('data-task-id'));
                    return;
                }

                const noteBtn = e.target.closest('.note-btn');
                if (noteBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    openNoteModal(
                        noteBtn.getAttribute('data-task-id'),
                        noteBtn.getAttribute('data-date'),
                        noteBtn.getAttribute('data-task-name')
                    );
                    return;
                }

                const historyBtn = e.target.closest('.history-btn');
                if (historyBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    openHistoryModal(historyBtn.getAttribute('data-task-id'));
                    return;
                }

                const moveBtn = e.target.closest('.move-btn');
                if (moveBtn) {
                    e.preventDefault();
                    e.stopPropagation();
                    openMoveMenu(
                        moveBtn.getAttribute('data-task-id'),
                        moveBtn.getAttribute('data-task-group'),
                        moveBtn
                    );
                    return;
                }

                const moveMenuItem = e.target.closest('.move-to-group-btn');
                if (moveMenuItem) {
                    e.preventDefault();
                    moveTask(
                        moveMenuItem.getAttribute('data-task-id'),
                        moveMenuItem.getAttribute('data-group')
                    );
                    // The menu will be closed by the document's 'once' listener
                    return;
                }

                const cellBtn = e.target.closest('.cell-btn');
                if (cellBtn) {
                    const type = cellBtn.getAttribute('data-type');
                    if (type === 'number') {
                        editNumberCell(cellBtn);
                        return;
                    }
                    const direction = ((type === 'counter' || type === 'kaizen') && isDecrementMode) ? -1 : 1;
                    toggleCell(
                        cellBtn.getAttribute('data-task-id'),
                        cellBtn.getAttribute('data-date'),
                        parseInt(cellBtn.getAttribute('data-status')),
                        type,
                        direction
                    );
                    return;
                }
                const tabBtn = e.target.closest('.group-tab');
                if (tabBtn) {
                    selectedGroup = tabBtn.getAttribute('data-group');
                    render();
                }
            });

            // Right-click handler for counter/kaizen decrement
            document.addEventListener('contextmenu', (e) => {
                const cellBtn = e.target.closest('.cell-btn');
                const cellType = cellBtn && cellBtn.getAttribute('data-type');
                if (cellBtn && (cellType === 'counter' || cellType === 'kaizen')) {
                    e.preventDefault();
                    toggleCell(
                        cellBtn.getAttribute('data-task-id'),
                        cellBtn.getAttribute('data-date'),
                        parseInt(cellBtn.getAttribute('data-status')),
                        cellBtn.getAttribute('data-type'),
                        -1
                    );
                }
            });

            // Form submit handler for adding tasks
            document.getElementById('addTaskForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addTask(document.getElementById('taskName').value, document.getElementById('taskType').value);
            });

            // --- Virtual Keyboard Logic ---
            let focusedInputElement = null;
            let isVirtualKeyboardEnabled = false; // Default state is off
            const virtualKeyboard = document.getElementById('virtualKeyboard');
            const keyboardContainer = document.getElementById('keyboardContainer');
            const toggleKeyboardButton = document.getElementById('toggleKeyboard');
            const closeKeyboardButton = document.getElementById('closeKeyboard');

            // Helper to check if an element is a text input
            function isTextInput(element) {
                if (!element) return false;
                const tagName = element.tagName;
                return (tagName === 'INPUT' && element.type === 'text') ||
                       tagName === 'TEXTAREA' ||
                       element.isContentEditable;
            }

            // Update button visual style based on state
            function updateKeyboardButtonVisualState() {
                if (isVirtualKeyboardEnabled) {
                    toggleKeyboardButton.classList.add('bg-blue-600', 'text-white');
                    toggleKeyboardButton.classList.remove('bg-slate-200', 'text-slate-600');
                    toggleKeyboardButton.setAttribute('aria-pressed', 'true');
                } else {
                    toggleKeyboardButton.classList.remove('bg-blue-600', 'text-white');
                    toggleKeyboardButton.classList.add('bg-slate-200', 'text-slate-600');
                    toggleKeyboardButton.setAttribute('aria-pressed', 'false');
                    virtualKeyboard.classList.add('hidden'); // Ensure keyboard is hidden when disabled
                }
            }

            // Decrement mode toggle
            const toggleDecrementButton = document.getElementById('toggleDecrement');

            function updateDecrementButtonVisualState() {
                if (isDecrementMode) {
                    toggleDecrementButton.classList.add('bg-red-500', 'text-white');
                    toggleDecrementButton.classList.remove('bg-slate-200', 'text-slate-600');
                    toggleDecrementButton.setAttribute('aria-pressed', 'true');
                } else {
                    toggleDecrementButton.classList.remove('bg-red-500', 'text-white');
                    toggleDecrementButton.classList.add('bg-slate-200', 'text-slate-600');
                    toggleDecrementButton.setAttribute('aria-pressed', 'false');
                }
            }

            toggleDecrementButton.addEventListener('click', () => {
                isDecrementMode = !isDecrementMode;
                updateDecrementButtonVisualState();
            });

            // Toggle the feature on/off
            toggleKeyboardButton.addEventListener('click', () => {
                isVirtualKeyboardEnabled = !isVirtualKeyboardEnabled;
                updateKeyboardButtonVisualState();
                
                // If we just enabled it and an input is already focused, show the keyboard.
                if (isVirtualKeyboardEnabled && isTextInput(document.activeElement)) {
                    focusedInputElement = document.activeElement;
                    virtualKeyboard.classList.remove('hidden');
                }
            });

            // Show keyboard automatically on input focus if enabled
            document.addEventListener('focusin', (e) => {
                if (isTextInput(e.target)) {
                    focusedInputElement = e.target;
                    if (isVirtualKeyboardEnabled) {
                        virtualKeyboard.classList.remove('hidden');
                    }
                }
            });

            // Hide keyboard when focus is lost from an input, but not if it moves to the keyboard
            document.addEventListener('focusout', (e) => {
                if (isTextInput(e.target)) {
                    // relatedTarget is the element that receives focus. If it's outside the keyboard, hide.
                    if (!virtualKeyboard.contains(e.relatedTarget)) {
                         virtualKeyboard.classList.add('hidden');
                    }
                }
            });
            
            // The keyboard's own close button
            closeKeyboardButton.addEventListener('click', () => {
                virtualKeyboard.classList.add('hidden');
            });

            function createVirtualKeyboard() {
                // This function is the same as before, but ensure keys are <button type="button">
                const keysLayout = [
                    "1 2 3 4 5 6 7 8 9 0", "q w e r t y u i o p", "a s d f g h j k l", "z x c v b n m",
                ];
                keyboardContainer.innerHTML = '';
                keysLayout.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'flex justify-center gap-1 my-1';
                    row.split(' ').forEach(key => {
                        const keyButton = document.createElement('button');
                        keyButton.setAttribute('type', 'button');
                        keyButton.className = 'keyboard-key h-10 rounded-md bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 shadow-sm flex-1 text-slate-700 dark:text-slate-200 font-semibold transition-colors hover:bg-slate-100 dark:hover:bg-slate-600';
                        keyButton.textContent = key;
                        keyButton.dataset.key = key;
                        rowDiv.appendChild(keyButton);
                    });
                    keyboardContainer.appendChild(rowDiv);
                });
                const bottomRow = document.createElement('div');
                bottomRow.className = 'flex justify-center gap-1 my-1';
                const backspaceKey = document.createElement('button');
                backspaceKey.setAttribute('type', 'button');
                backspaceKey.className = 'keyboard-key h-10 rounded-md bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 shadow-sm flex-1 text-slate-700 dark:text-slate-200 font-semibold transition-colors hover:bg-slate-100 dark:hover:bg-slate-600';
                backspaceKey.innerHTML = '<i data-lucide="delete" class="w-5 h-5 mx-auto"></i>';
                backspaceKey.dataset.key = 'backspace';
                backspaceKey.style.flexGrow = '2';
                bottomRow.appendChild(backspaceKey);
                const spaceKey = document.createElement('button');
                spaceKey.setAttribute('type', 'button');
                spaceKey.className = 'keyboard-key h-10 rounded-md bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 shadow-sm flex-1 text-slate-700 dark:text-slate-200 font-semibold transition-colors hover:bg-slate-100 dark:hover:bg-slate-600';
                spaceKey.innerHTML = '<i data-lucide="space" class="w-5 h-5 mx-auto"></i>';
                spaceKey.dataset.key = 'space';
                spaceKey.style.flexGrow = '8';
                bottomRow.appendChild(spaceKey);
                keyboardContainer.appendChild(bottomRow);
                lucide.createIcons();
            }

            // Handle key presses. Use 'mousedown' to prevent the input from losing focus.
            keyboardContainer.addEventListener('mousedown', (e) => {
                const keyButton = e.target.closest('.keyboard-key');
                if (keyButton) {
                    e.preventDefault(); // This is the key to prevent focus loss from the input.
                }
            });
            keyboardContainer.addEventListener('click', (e) => {
                const keyButton = e.target.closest('.keyboard-key');
                if (!keyButton || !focusedInputElement) return;

                const key = keyButton.dataset.key;
                const input = focusedInputElement;
                const isContentEditable = input.isContentEditable;
                
                if (key === 'backspace') {
                    if (isContentEditable) document.execCommand('delete', false, null);
                    else input.value = input.value.slice(0, -1);
                } else if (key === 'space') {
                    if (isContentEditable) document.execCommand('insertText', false, ' ');
                    else input.value += ' ';
                } else {
                    if (isContentEditable) document.execCommand('insertText', false, key);
                    else input.value += key;
                }
                
                input.focus();
                input.dispatchEvent(new Event('input', { bubbles: true, cancelable: true }));
            });
            
            // --- Initialization ---
            createVirtualKeyboard();
            updateKeyboardButtonVisualState(); // Set initial button style
            // --- End Virtual Keyboard Logic ---

            // Initialize the application
            fetchData();
        });

        // --- Rendering ---
        function getWeekDates(date) {
            const start = new Date(date);
            const day = start.getDay();
            const diff = start.getDate() - day + (day === 0 ? -6 : 1);
            start.setDate(diff);
            return Array.from({length: 7}, (_, i) => {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                return d.toISOString().split('T')[0];
            });
        }

        function formatDisplayDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function getTimerDisplay(taskId) {
            const todayStr = new Date().toISOString().split('T')[0];
            const key = `${taskId}_${todayStr}`;
            const isRunning = activeTimer && activeTimer.taskId === taskId;

            let displaySeconds;
            if (isRunning) {
                const elapsed = Math.floor((Date.now() - activeTimer.startTime) / 1000);
                displaySeconds = activeTimer.baseSeconds + elapsed;
            } else {
                displaySeconds = durations[key] || 0;
            }

            if (isRunning) {
                return `<button class="timer-btn flex items-center gap-1 text-xs font-mono font-bold text-amber-500" data-task-id="${taskId}">
                    <i data-lucide="square" class="w-3 h-3 fill-amber-500 pointer-events-none"></i>
                    <span class="pointer-events-none">${formatDuration(displaySeconds)}</span>
                </button>`;
            }
            if (displaySeconds > 0) {
                return `<button class="timer-btn flex items-center gap-1 text-xs font-mono text-slate-400 hover:text-amber-500 transition-colors" data-task-id="${taskId}">
                    <i data-lucide="play" class="w-3 h-3 pointer-events-none"></i>
                    <span class="pointer-events-none">${formatDuration(displaySeconds)}</span>
                </button>`;
            }
            return `<button class="timer-btn text-slate-300 hover:text-amber-400 opacity-0 group-hover:opacity-100 transition-opacity" data-task-id="${taskId}" aria-label="Start timer">
                <i data-lucide="timer" class="w-3 h-3 pointer-events-none"></i>
            </button>`;
        }

        function updateTimerDisplay() {
            if (!activeTimer) return;
            const elapsed = Math.floor((Date.now() - activeTimer.startTime) / 1000);
            const total = activeTimer.baseSeconds + elapsed;
            const formatted = formatDuration(total);

            const btn = document.querySelector(`.timer-btn[data-task-id="${activeTimer.taskId}"]`);
            if (btn) {
                btn.innerHTML = `<i data-lucide="square" class="w-3 h-3 fill-amber-500 pointer-events-none"></i><span class="pointer-events-none">${formatted}</span>`;
                lucide.createIcons({ nodes: [btn] });
            }

            const cellDisplay = document.querySelector(`.timer-cell-display[data-task-id="${activeTimer.taskId}"]`);
            if (cellDisplay) cellDisplay.textContent = formatted;
        }

        function toggleTaskTimer(taskId) {
            if (activeTimer && activeTimer.taskId === taskId) {
                stopTimer();
            } else {
                if (activeTimer) stopTimer();
                const todayStr = new Date().toISOString().split('T')[0];
                const baseSeconds = durations[`${taskId}_${todayStr}`] || 0;
                activeTimer = {
                    taskId,
                    dateStr: todayStr,
                    startTime: Date.now(),
                    baseSeconds,
                    intervalId: setInterval(updateTimerDisplay, 1000)
                };
                render();
                fetch(`${API_BASE}/timers/${taskId}/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ baseSeconds })
                }).catch(() => {});
            }
        }

        function stopTimer() {
            if (!activeTimer) return;
            clearInterval(activeTimer.intervalId);
            const elapsed = Math.floor((Date.now() - activeTimer.startTime) / 1000);
            const totalSeconds = activeTimer.baseSeconds + elapsed;
            const { taskId, dateStr } = activeTimer;
            durations[`${taskId}_${dateStr}`] = totalSeconds;
            activeTimer = null;
            render();
            fetch(`${API_BASE}/timers/${taskId}/stop`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ totalSeconds })
            }).catch(() => {});
        }

        const KAIZEN_ICONS = [
            `<div class="w-5 h-5 rounded-md border-2 border-slate-200 bg-white pointer-events-none"></div>`,
            `<div class="w-2.5 h-2.5 rounded-full bg-slate-400 pointer-events-none" title="Worked on it"></div>`,
            `<i data-lucide="plus" class="w-6 h-6 text-blue-500 pointer-events-none" title="Improved it"></i>`,
            `<i data-lucide="circle" class="w-6 h-6 text-emerald-500 pointer-events-none" title="Finished it"></i>`,
            `<i data-lucide="circle-plus" class="w-6 h-6 text-violet-500 pointer-events-none" title="Finished &amp; improved"></i>`,
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" class="pointer-events-none">
                <polygon points="2,12 6,3 12,12"    fill="#fef9c3" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="6,3 18,3 12,12"    fill="#fde68a" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="12,12 18,3 22,12"  fill="#fcd34d" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="2,12 22,12 12,17"  fill="#fbbf24" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="2,12 12,17 12,22"  fill="#f59e0b" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="22,12 12,22 12,17" fill="#d97706" stroke="#b45309" stroke-width="0.6"/>
                <polygon points="6,3 18,3 22,12 12,22 2,12" fill="none" stroke="#92400e" stroke-width="1" stroke-linejoin="round"/>
            </svg>`,
        ];

        function getIconForLevel(status, type) {
            if (type === 'counter') {
                return `<span class="font-bold text-blue-600 pointer-events-none select-none">${status || 0}</span>`;
            }
            if (type === 'number') {
                if (!status) return `<span class="text-slate-300 pointer-events-none select-none text-sm">—</span>`;
                return `<span class="font-bold text-purple-600 pointer-events-none select-none">${status}</span>`;
            }
            if (type === 'kaizen') {
                return KAIZEN_ICONS[status] ?? KAIZEN_ICONS[0];
            }
            if (status === 1) return `<i data-lucide="check-circle-2" class="w-6 h-6 text-emerald-500 fill-emerald-50 pointer-events-none"></i>`;
            return `<div class="w-5 h-5 rounded-md border-2 border-slate-200 bg-white pointer-events-none"></div>`;
        }

        function editNumberCell(cellBtn) {
            const taskId = cellBtn.getAttribute('data-task-id');
            const dateStr = cellBtn.getAttribute('data-date');
            const currentStatus = parseInt(cellBtn.getAttribute('data-status')) || 0;

            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentStatus || '';
            input.style.cssText = 'width:3rem;text-align:center;font-weight:700;color:#9333ea;border:1px solid #d8b4fe;border-radius:0.375rem;outline:none;background:transparent;';

            cellBtn.innerHTML = '';
            cellBtn.appendChild(input);
            input.focus();
            if (currentStatus) input.select();

            let saved = false;
            async function save() {
                if (saved) return;
                saved = true;
                const val = parseInt(input.value);
                const newStatus = isNaN(val) ? 0 : val;
                progress[`${taskId}_${dateStr}`] = newStatus;
                render();
                try {
                    await fetch(`${API_BASE}/progress`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ taskId, date: dateStr, status: newStatus })
                    });
                } catch (err) { fetchData(); }
            }

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') input.blur();
                if (e.key === 'Escape') render();
            });
        }

        function render() {
            const weekDates = getWeekDates(currentViewDate);
            const year = currentViewDate.getFullYear();
            const week = getISOWeek(currentViewDate);

            document.getElementById('yearDisplay').innerText = year;
            document.getElementById('weekDisplay').innerText = `Week ${week}`;
            document.getElementById('dateRangeDisplay').innerText = `${formatDisplayDate(weekDates[0])} - ${formatDisplayDate(weekDates[6])}`;

            // Render Groups
            document.getElementById('groupTabs').innerHTML = allGroups.map(g => `
                <button data-group="${g}"
                    class="group-tab px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all border ${selectedGroup === g ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-500/20' : 'text-slate-500 hover:bg-slate-100 border-transparent'}">
                    ${g}
                </button>
            `).join('');

            const filtered = tasks.filter(h => h.group === selectedGroup);
            document.getElementById('taskRows').innerHTML = filtered.map(task => `
                <tr data-task-id="${task.id}" class="group hover:bg-slate-50/50 transition-colors">
                    <td class="p-6 sticky left-0 bg-white group-hover:bg-slate-50/50 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                        <div class="font-semibold text-slate-700">${task.name}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${task.type}</span>
                            ${getTimerDisplay(task.id)}
                        </div>
                    </td>
                    ${weekDates.map(date => {
                        const status = progress[`${task.id}_${date}`] || 0;
                        const duration = durations[`${task.id}_${date}`] || 0;
                        const noteKey = `${task.id}_${date}`;
                        const hasNote = !!(notes[noteKey] && notes[noteKey].length > 0);
                        const isRunning = activeTimer && activeTimer.taskId === task.id && activeTimer.dateStr === date;
                        let cellDurationHtml = '';
                        if (isRunning) {
                            const elapsed = Math.floor((Date.now() - activeTimer.startTime) / 1000);
                            const total = activeTimer.baseSeconds + elapsed;
                            cellDurationHtml = `<span class="timer-cell-display text-[10px] font-mono font-bold text-amber-500" data-task-id="${task.id}">${formatDuration(total)}</span>`;
                        } else if (duration > 0) {
                            cellDurationHtml = `<span class="text-[10px] font-mono text-slate-400">${formatDuration(duration)}</span>`;
                        }
                        const noteBtnHtml = hasNote
                            ? `<button class="note-btn w-4 h-4 flex items-center justify-center" data-task-id="${task.id}" data-date="${date}" data-task-name="${task.name}" title="Edit note">
                                <span class="w-2 h-2 rounded-full bg-amber-400 pointer-events-none"></span>
                               </button>`
                            : `<button class="note-btn w-4 h-4 flex items-center justify-center opacity-0 group-hover/cell:opacity-100 transition-opacity text-slate-300 hover:text-amber-400" data-task-id="${task.id}" data-date="${date}" data-task-name="${task.name}" title="Add note">
                                <i data-lucide="pencil" class="w-3 h-3 pointer-events-none"></i>
                               </button>`;
                        return `
                        <td class="p-2 text-center group/cell">
                            <div class="flex flex-col items-center gap-0.5">
                                <button class="cell-btn w-12 h-12 mx-auto rounded-2xl border border-transparent hover:border-slate-200 hover:bg-white flex items-center justify-center cell-transition select-none"
                                    data-task-id="${task.id}" data-date="${date}" data-status="${status}" data-type="${task.type}">
                                    ${getIconForLevel(status, task.type)}
                                </button>
                                ${cellDurationHtml}
                                ${noteBtnHtml}
                            </div>
                        </td>`;
                    }).join('')}
                    <td class="p-4 text-right">
                        <div class="flex items-center justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="history-btn p-2 text-slate-400 hover:text-amber-500" data-task-id="${task.id}" title="View history"><i data-lucide="clock" class="w-4 h-4"></i></button>
                            ${task.type === 'checklist' ? `<button class="convert-btn p-2 text-slate-400 hover:text-violet-500" data-task-id="${task.id}" title="Convert to Kaizen"><i data-lucide="diamond" class="w-4 h-4"></i></button>` : ''}
                            <button class="move-btn p-2 text-slate-400 hover:text-blue-500" data-task-id="${task.id}" data-task-group="${task.group}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-move w-5 h-5 pointer-events-none">
                                    <path d="m9 18 3-3-3-3"/><path d="M12 15H3"/><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v2"/>
                                </svg>
                            </button>
                            <button class="delete-btn p-2 text-slate-400 hover:text-red-500" data-id="${task.id}">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            lucide.createIcons();
        }
    </script>
</body>
</html>
